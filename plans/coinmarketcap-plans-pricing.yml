specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: CoinMarketCap
providerId: coinmarketcap
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Crypto
  - Market Data
  - Plans
description: >-
  CoinMarketCap publishes six tiers of Pro API access. Free Basic (15K credits/mo, personal use)
  through Hobbyist ($29), Startup ($79), Standard ($299), Professional ($699), and custom
  Enterprise. Annual billing offers up to 20% discount. Commercial use is permitted starting at
  the Startup tier.
sources:
  - https://coinmarketcap.com/api/pricing/
  - https://coinmarketcap.com/api/documentation/v1/
plans:
  - id: cmc-basic
    name: Basic
    type: freemium
    description: Free - 15,000 credits/month, personal use only, 30+ endpoints.
    entries:
      - label: Monthly subscription
        name: basic_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Monthly credits
        name: basic_credits
        type: quota
        metric: credit
        limit: 15000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 30+ endpoints
