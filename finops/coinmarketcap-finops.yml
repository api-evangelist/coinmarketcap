specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: CoinMarketCap
providerId: coinmarketcap
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Crypto
  - Market Data
  - FinOps
  - FOCUS
description: >-
  FinOps view of CoinMarketCap. Subscription tiers each gate a monthly credit allowance and a
  per-minute rate limit. Per-call credit cost varies by endpoint and by the number of items in
  the response. Annual billing offers up to 20% discount.
sources:
  - https://coinmarketcap.com/api/pricing/
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: CoinMarketCap
serviceCategory: Crypto Market Data
billingModel:
  pricingCategory: Subscription with Metered Credit Allowance
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Subscription
    - Usage
    - Adjustment
focusColumns:
  ServiceName: CoinMarketCap Pro API
  ServiceCategory: Crypto Market Data
  ProviderName: CoinMarketCap
  PublisherName: CoinMarketCap
  InvoiceIssuerName: CoinMarketCap
  BillingCurrency: USD
  ChargeCategory: Subscription
meters:
  - name: subscription
    description: Monthly subscription per tier.
    unit: month
    aggregation: sum
    dimensions:
      - api_key
  - name: credits
    description: Per-call credit consumption against monthly allowance.
    unit: credit
    aggregation: sum
    dimensions:
      - api_key
      - endpoint
principles:
  - name: Visibility
    description: Track per-endpoint credit consumption to forecast tier sufficiency.
  - name: Allocation
    description: Allocate subscription to consuming product; tag API keys per workload.
  - name: Optimization
    description: Cache responses and use bundled symbol calls to reduce credit consumption.
  - name: Accountability
    description: Assign a billing owner per API key; review monthly credits-vs-allowance.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
